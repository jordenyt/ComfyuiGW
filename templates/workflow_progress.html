<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workflow Progress</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        #status { margin: 20px 0; padding: 10px; background: #f5f5f5; }
        #results { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .result-card { border: 1px solid #ccc; padding: 10px; border-radius: 4px; min-width: 200px; max-width: 300px; }
        .result-card img { max-width: 100%; max-height: 200px; object-fit: contain; }
        .result-card video { max-width: 100%; max-height: 200px; }
        .result-card audio { width: 100%; }
        .result-card pre { max-height: 100px; overflow: auto; background: #f5f5f5; padding: 5px; font-size: 12px; }
        .txt-content { white-space: pre-wrap; word-break: break-word; font-family: monospace; font-size: 13px; }
        button { background-color: #f44336; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #d32f2f; }
        .download-btn { background-color: #4CAF50; margin-top: 5px; }
        .download-btn:hover { background-color: #45a049; }
        .copy-btn { background-color: #2196F3; margin-top: 5px; }
        .copy-btn:hover { background-color: #1976D2; }
        .copy-btn.copied { background-color: #4CAF50; }
    </style>
</head>
<body>
    <h1>Workflow Progress{% if workflow %}: <span id="workflowName">{{ workflow }}</span>{% endif %}</h1>
    <div id="status">Loading...</div>
    <button id="interruptButton" onclick="interruptWorkflow()">Interrupt</button>
    <div id="results"></div>

    <script>
        const workflow = "{{ workflow }}";
        const startTime = {{ start_time if start_time else 0 }};
        let statusTimeout;

        function updateStatus() {
            fetch('/comfyui_status')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status').innerHTML =
                        `<strong>Progress:</strong> ${data.progress}<br><strong>Step:</strong> ${data.step}`;

                    if (data.progress === "Done") {
                        document.getElementById('interruptButton').style.display = 'none';
                        findWorkflowOutputs();
                    } else {
                        setTimeout(updateStatus, 1000);
                    }
                });
        }

        function findWorkflowOutputs() {
            if (!workflow) return;
            fetch(`/find_workflow_outputs/${workflow}`)
                .then(r => r.json())
                .then(data => {
                    console.log('API response:', data);
                    if (data.has_output_config === false) {
                        document.getElementById('results').style.display = 'none';
                        document.getElementById('status').innerHTML += `<pre style="margin-top:10px;background:#f5f5f5;padding:10px;">Debug: ${JSON.stringify(data.debug || data.error || 'No output config', null, 2)}</pre>`;
                        return;
                    }
                    if (data.files && data.files.length > 0) {
                        console.log('Files found:', data.files);
                        displayResults(data.files);
                    } else {
                        document.getElementById('results').innerHTML = `<pre style="background:#f5f5f5;padding:10px;">Debug (no files found): ${JSON.stringify(data.debug, null, 2)}</pre>`;
                    }
                });
        }

        function displayResults(files) {
            const container = document.getElementById('results');
            let html = '<h3>Output Files</h3>';

            files.forEach(file => {
                const ext = file.extension ? file.extension.toLowerCase() : file.filename.split('.').pop().toLowerCase();
                const url = '/download_file?filepath=' + encodeURIComponent(file.filepath);
                console.log('Generated URL:', url);
                console.log('Original filepath:', file.filepath);

                html += `<div class="result-card">
                    <strong>${file.filename}</strong><br>
                    <small>${new Date(file.mod_time * 1000).toLocaleString()}</small><br>`;

                if (['jpg', 'jpeg', 'png', 'webp', 'gif', 'bmp'].includes(ext)) {
                    html += `<img src="${url}" alt="${file.filename}"/>`;
                } else if (['mp4', 'webm', 'avi', 'mov'].includes(ext)) {
                    html += `<video src="${url}" controls></video>`;
                } else if (['mp3', 'wav', 'ogg', 'flac'].includes(ext)) {
                    html += `<audio src="${url}" controls></audio>`;
                } else if (ext === 'txt') {
                    html += `<div class="txt-content" id="content_${file.filename}" style="max-height:300px;overflow:auto;background:#f5f5f5;padding:5px;">Loading...</div>`;
                    html += `<button class="copy-btn" onclick="copyToClipboard('content_${file.filename}', this)">Copy to Clipboard</button>`;
                    fetch(url)
                        .then(r => {
                            if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                            return r.text();
                        })
                        .then(text => {
                            const el = document.getElementById(`content_${file.filename}`);
                            if (el) {
                                el.textContent = text;
                                el.dataset.text = text; // Store for copying
                            }
                        })
                        .catch(err => {
                            const el = document.getElementById(`content_${file.filename}`);
                            if (el) el.textContent = 'Error loading: ' + err.message + '\nURL: ' + url;
                        });
                } else {
                    html += `<pre id="content_${file.filename}" style="max-height:100px;overflow:auto;">Loading...</pre>`;
                    fetch(url).then(r => r.text()).then(text => {
                        const el = document.getElementById(`content_${file.filename}`);
                        if (el) el.textContent = text.substring(0, 500) + (text.length > 500 ? '...' : '');
                    });
                }

                html += `<button class="download-btn" onclick="window.open('${url}', '_blank')">Download</button>
                </div>`;
            });

            container.innerHTML = html;
        }

        function copyToClipboard(elementId, btn) {
            const el = document.getElementById(elementId);
            if (!el || !el.dataset.text) return;
            navigator.clipboard.writeText(el.dataset.text).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy to Clipboard';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                btn.textContent = 'Failed';
                setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
            });
        }

        function interruptWorkflow() {
            fetch('/comfyui_interrupt')
                .then(() => alert('Workflow interrupted'));
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearTimeout(statusTimeout);
            else updateStatus();
        });

        updateStatus();
    </script>
</body>
</html>
